<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JF5.0 Ecosystem | Post-Quantum Cryptography</title>
    <style>
        :root { 
            --primary: #58a6ff; 
            --text: #ffffff; 
        }
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: -apple-system, sans-serif;
            /* พื้นหลังเป็นรูปสายน้ำแบบสุ่ม (เปลี่ยนทุกครั้งที่โหลด) */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://source.unsplash.com/featured/?nature,water,river,waterfall') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }
        .box { 
            /* กล่องแบบกระจกฝ้า (Glassmorphism) */
            background: rgba(22, 27, 34, 0.8); 
            backdrop-filter: blur(10px);
            padding: 60px; 
            border-radius: 24px; 
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.1);
            border-top: 5px solid var(--primary); 
            max-width: 500px; 
        }
        h1 { color: var(--primary); font-size: 2.8rem; margin: 0; letter-spacing: 5px; font-weight: 800; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .sub-title { color: #d1d5da; font-size: 1.1rem; margin: 15px 0 40px 0; letter-spacing: 1px; font-weight: 300; }
        .status-box { background: rgba(0,0,0,0.4); padding: 15px 25px; border-radius: 12px; display: inline-flex; align-items: center; font-family: monospace; font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.1); color: #3fb950; }
        .dot { height: 12px; width: 12px; background-color: #3fb950; border-radius: 50%; display: inline-block; margin-right: 12px; animation: blink 1.5s infinite; box-shadow: 0 0 10px #3fb950; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .links { margin-top: 50px; display: flex; justify-content: center; gap: 20px; }
        .links a { color: var(--text); text-decoration: none; font-size: 0.85rem; transition: 0.3s; padding: 12px 25px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); font-weight: 600; letter-spacing: 1px; }
        .links a:hover { background: var(--primary); color: #0d1117; transform: translateY(-3px); border-color: var(--primary); }
        .secret-tag { margin-top: 40px; color: rgba(255,255,255,0.3); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>JF5.0</h1>
        <div class="sub-title">POST-QUANTUM ECOSYSTEM</div>
        
        <div class="status-box">
            <span class="dot"></span> NODE v17.7 : ACTIVE
        </div>

        <div class="links">
            <a href="https://github.com/mfreedomx-collab" target="_blank">GITHUB</a>
            <a href="https://linkedin.com/in/montreejf50" target="_blank">LINKEDIN</a>
        </div>

        <div class="secret-tag">
            - AUTHENTICATED ACCESS ONLY -
        </div>
    </div>
</body>
</html>
