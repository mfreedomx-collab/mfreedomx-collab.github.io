<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montree JF5.0 Ecosystem  | JF5.0 PQC</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #30363d; background: #161b22; padding: 50px; border-radius: 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-top: 4px solid #58a6ff; }
        h1 { color: #58a6ff; font-size: 2.5rem; margin-bottom: 5px; letter-spacing: 2px; }
        .tagline { color: #8b949e; font-size: 1.1rem; margin-bottom: 30px; }
        .status { background: #0d1117; padding: 10px 20px; border-radius: 50px; display: inline-flex; align-items: center; font-size: 0.9rem; border: 1px solid #30363d; }
        .dot { height: 10px; width: 10px; background-color: #3fb950; border-radius: 50%; display: inline-block; margin-right: 10px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .vibe { margin-top: 40px; font-style: italic; color: #484f58; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Montree JF5.0 Ecosystem </h1>
        <div class="tagline">Architect of JF5.0 Post-Quantum Cryptography</div>
        
        <div class="status">
            <span class="dot"></span> SYSTEM v17.7 : OPERATIONAL
        </div>

        <div class="vibe">
            "Vibe Coding: The Future of Hybrid Entropy"
        </div>
    </div>
</body>
</html>
