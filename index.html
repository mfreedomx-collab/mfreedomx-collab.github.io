<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JF5.0 Ecosystem | Post-Quantum Cryptography</title>
    <style>
        :root { --primary: #58a6ff; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #30363d; background: var(--card); padding: 60px; border-radius: 24px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.6); border-top: 5px solid var(--primary); max-width: 500px; }
        h1 { color: var(--primary); font-size: 2.8rem; margin: 0; letter-spacing: 3px; font-weight: 800; }
        .sub-title { color: #8b949e; font-size: 1.1rem; margin: 15px 0 40px 0; letter-spacing: 1px; }
        .status-box { background: #0d1117; padding: 15px 25px; border-radius: 12px; display: inline-flex; align-items: center; font-family: monospace; font-size: 0.95rem; border: 1px solid #30363d; color: #3fb950; }
        .dot { height: 12px; width: 12px; background-color: #3fb950; border-radius: 50%; display: inline-block; margin-right: 12px; animation: blink 1.2s infinite; box-shadow: 0 0 10px #3fb950; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .links { margin-top: 50px; display: flex; justify-content: center; gap: 25px; }
        .links a { color: var(--text); text-decoration: none; font-size: 0.9rem; transition: 0.3s; padding: 10px 20px; border-radius: 8px; background: #21262d; border: 1px solid #30363d; }
        .links a:hover { background: var(--primary); color: #0d1117; transform: translateY(-3px); }
        .secret-tag { margin-top: 40px; color: #484f58; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>JF5.0</h1>
        <div class="sub-title">POST-QUANTUM ECOSYSTEM</div>
        
        <div class="status-box">
            <span class="dot"></span> NODE v17.7 : ACTIVE
        </div>

        <div class="links">
            <a href="https://github.com/mfreedomx-collab" target="_blank">GITHUB</a>
            <a href="https://linkedin.com/in/montreejf50" target="_blank">LINKEDIN</a>
        </div>

        <div class="secret-tag">
            - TOP SECRET : VIBE CODING PROJECT -
        </div>
    </div>
</body>
</html>
